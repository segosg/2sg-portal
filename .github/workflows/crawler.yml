name: auto.market crawler

on:
  schedule:
    # Tous les jours à 07h00 heure de Paris (06h00 UTC en hiver, 05h00 UTC en été)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Permet de déclencher manuellement depuis l'onglet Actions GitHub

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python crawler/crawler.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs-${{ github.run_id }}
          retention-days: 7
          path: |
            *.log